<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="SwiftBus icon">
  <title>SwiftBus</title>
  <!-- Rounded square background matching site navy -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#113047"/>

  <!-- Bus silhouette (white) -->
