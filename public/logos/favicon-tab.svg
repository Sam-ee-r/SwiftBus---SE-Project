    <rect x="2" y="6" width="44" height="20" rx="5" />
    <rect x="8" y="2" width="28" height="6" rx="2" />
    <circle cx="14" cy="30" r="4" />
    <circle cx="36" cy="30" r="4" />
    <!-- small bumper details -->
    <rect x="4" y="10" width="6" height="8" rx="1" opacity="0.06"/>
    <rect x="18" y="10" width="6" height="8" rx="1" opacity="0.06"/>
    <rect x="32" y="10" width="6" height="8" rx="1" opacity="0.06"/>
  </g>
